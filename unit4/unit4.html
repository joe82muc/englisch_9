<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Unit 4 - New Zealand</title>
  <style>
    :root {
      --bg-1: #f4f8ff;
      --bg-2: #fff1de;
      --ink: #10203a;
      --card: #ffffff;
      --line: #d7e3ff;
      --shadow: 0 14px 36px rgba(20, 49, 96, 0.14);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 10% 8%, #dce9ff 0%, transparent 42%),
        radial-gradient(circle at 92% 84%, #ffd8b8 0%, transparent 34%),
        linear-gradient(130deg, var(--bg-1), var(--bg-2));
    }
    .wrap { max-width: 1200px; margin: 0 auto; padding: 1.1rem 1rem 2.2rem; }
    .hero {
      background: linear-gradient(130deg, #0a5ebf, #1d80df 52%, #f39d5f);
      color: #fff;
      border-radius: 24px;
      padding: 1.3rem;
      box-shadow: var(--shadow);
    }
    h1 { margin: 0; font-size: clamp(1.55rem, 2.9vw, 2.6rem); line-height: 1.2; }
    .meta { margin: 0.5rem 0 0; font-size: 1.03rem; }
    .author { margin: 0.35rem 0 0; font-size: 0.95rem; opacity: 0.95; }
    .back {
      display: inline-block;
      margin-top: 0.7rem;
      color: #fff;
      text-decoration: none;
      border: 1px solid rgba(255,255,255,0.6);
      border-radius: 999px;
      padding: 0.35rem 0.7rem;
      font-weight: 700;
    }
    .panel {
      margin-top: 1rem;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 1rem;
      box-shadow: var(--shadow);
    }
    .label {
      margin: 0 0 0.7rem;
      font-size: 0.87rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #3a5b93;
      font-weight: 700;
    }
    .btn-grid { display: grid; gap: 0.7rem; grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      text-decoration: none;
      border-radius: 14px;
      border: 1px solid #f1c79e;
      background: linear-gradient(180deg, #fff7ef, #ffefd9);
      color: #70350a;
      padding: 0.82rem 0.6rem;
      font-weight: 700;
      min-height: 52px;
    }
    .gallery-title { margin: 0 0 0.7rem; color: #0e3c79; }
    .gallery-grid { display: grid; gap: 0.8rem; grid-template-columns: repeat(4, minmax(0, 1fr)); }
    .slide {
      border-radius: 16px;
      overflow: hidden;
      position: relative;
      border: 1px solid #b9d4ff;
      background: #eef5ff;
      min-height: 185px;
    }
    .slide img {
      width: 100%;
      height: 100%;
      min-height: 185px;
      object-fit: cover;
      display: block;
      transition: opacity 0.45s ease;
    }
    .tag {
      position: absolute;
      left: 0.55rem;
      bottom: 0.55rem;
      background: rgba(7, 23, 45, 0.62);
      color: #fff;
      padding: 0.32rem 0.55rem;
      border-radius: 999px;
      font-size: 0.78rem;
      font-weight: 700;
    }
    @media (max-width: 980px) { .btn-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); } }
    @media (max-width: 620px) { .btn-grid { grid-template-columns: 1fr; } .slide, .slide img { min-height: 140px; } }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="hero">
      <h1>Unit 4: New Zealand</h1>
      <p class="meta">Englisch 9. Klasse - Mittelschule am Sportpark</p>
      <p class="author">Lernplattform von Johannes Mößner</p>
      <a class="back" href="../index.html">&larr; Zur Startseite</a>
    </section>

    <section class="panel">
      <p class="label">Vokabeln</p>
      <div class="btn-grid">
        <a class="btn" href="./vokabeltrainer.html">vokabeltrainer.html</a>
      </div>
    </section>

    <section class="panel">
      <h2 class="gallery-title">New Zealand Galerie (Menschen, Tiere, Landschaft)</h2>
      <div class="gallery-grid" id="galleryGrid">
        <figure class="slide"><img alt="Gallery image 1"><span class="tag"></span></figure>
        <figure class="slide"><img alt="Gallery image 2"><span class="tag"></span></figure>
        <figure class="slide"><img alt="Gallery image 3"><span class="tag"></span></figure>
        <figure class="slide"><img alt="Gallery image 4"><span class="tag"></span></figure>
      </div>
    </section>
  </main>

  <script>
    const images = Array.from({ length: 25 }, (_, i) => `./gallery_nz/nz-${String(i + 1).padStart(2, "0")}.jpg`);

    const tags = {};
    for (let i = 1; i <= 13; i += 1) tags[`nz-${String(i).padStart(2, "0")}`] = "Landscape";
    for (let i = 14; i <= 21; i += 1) tags[`nz-${String(i).padStart(2, "0")}`] = "Animals";
    for (let i = 22; i <= 25; i += 1) tags[`nz-${String(i).padStart(2, "0")}`] = "People";

    const slides = Array.from(document.querySelectorAll(".slide"));
    let queue = [];

    function shuffle(list) {
      const arr = [...list];
      for (let i = arr.length - 1; i > 0; i -= 1) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function refillQueue(excludeSet) {
      const candidates = images.filter((src) => !excludeSet.has(src));
      queue = shuffle(candidates.length ? candidates : images);
    }

    function nextImage(excludeSet) {
      if (queue.length === 0) refillQueue(excludeSet);
      for (let i = 0; i < images.length + 2; i += 1) {
        if (queue.length === 0) refillQueue(excludeSet);
        const candidate = queue.shift();
        if (!excludeSet.has(candidate)) return candidate;
      }
      return null;
    }

    function applyImage(slide, src) {
      const img = slide.querySelector("img");
      const tag = slide.querySelector(".tag");
      const key = src.split("/").pop().replace(".jpg", "");
      tag.textContent = "New Zealand - " + (tags[key] || "Photo");
      img.style.opacity = "0.25";
      setTimeout(() => {
        img.src = src;
        img.dataset.srcKey = src;
        img.style.opacity = "1";
      }, 130);
    }

    function fillInitial() {
      const used = new Set();
      queue = shuffle(images);
      slides.forEach((slide) => {
        const src = nextImage(used);
        if (!src) return;
        used.add(src);
        applyImage(slide, src);
      });
    }

    let pointer = 0;
    function rotateOne() {
      const visible = new Set(slides.map((s) => s.querySelector("img").dataset.srcKey).filter(Boolean));
      const slide = slides[pointer % slides.length];
      const currentSrc = slide.querySelector("img").dataset.srcKey;
      if (currentSrc) visible.delete(currentSrc);
      const src = nextImage(visible);
      if (src) applyImage(slide, src);
      pointer += 1;
    }

    fillInitial();
    setInterval(rotateOne, 2400);
  </script>
</body>
</html>
