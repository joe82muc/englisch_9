<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<title>AI English Conversation Trainer</title>

<style>

body{
font-family:Arial;
background:#eef3f8;
padding:40px;
}

.container{
max-width:900px;
margin:auto;
}

.chat{
background:white;
height:420px;
overflow-y:auto;
padding:20px;
border-radius:12px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.bubble{
padding:12px;
margin:10px 0;
border-radius:12px;
max-width:70%;
}

.ai{
background:#d9ecff;
}

.student{
background:#d6ffd9;
margin-left:auto;
text-align:right;
}

.feedback{
background:#fff4cc;
}

textarea{
width:100%;
height:90px;
margin-top:15px;
font-size:16px;
padding:10px;
}

button{
padding:10px 18px;
font-size:15px;
margin-top:10px;
margin-right:8px;
cursor:pointer;
}

.score{
margin-top:15px;
font-size:18px;
font-weight:bold;
}

</style>

</head>


<body>

<div class="container">

<h2>National Park Conversation Trainer</h2>

<div class="chat" id="chat"></div>

<textarea id="answer" placeholder="Write your answer here..."></textarea>

<br>

<button onclick="sendAnswer()">Send</button>
<button onclick="showHint()">Hint</button>
<button onclick="resetChat()">Reset</button>

<div class="score" id="score"></div>

</div>


<script>

let turns=0;
let points=0;
let lastHint="";

function addBubble(text,type){

const chat=document.getElementById("chat");

const bubble=document.createElement("div");

bubble.className="bubble "+type;

bubble.innerText=text;

chat.appendChild(bubble);

chat.scrollTop=chat.scrollHeight;

}


function speak(text){

const speech=new SpeechSynthesisUtterance(text);

speech.lang="en-GB";
speech.rate=0.95;

speechSynthesis.speak(speech);

}


async function sendAnswer(){

const input=document.getElementById("answer");

const text=input.value.trim();

if(text==="") return;

addBubble(text,"student");

input.value="";

turns++;

const response=await fetch("/chat",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
message:text
})

});

const data=await response.json();

const reply=data.reply;
const correction=data.correction;
const hint=data.hint;
const score=data.score;

lastHint=hint;

points+=score;

addBubble(reply,"ai");
speak(reply);

if(correction!=""){
addBubble("Correction: "+correction,"feedback");
}

updateScore();

}


function showHint(){

if(lastHint!=""){
alert(lastHint);
}

}


function updateScore(){

let percent=Math.round(points/turns*100);

let grade;

if(percent>=90) grade=1;
else if(percent>=75) grade=2;
else if(percent>=60) grade=3;
else if(percent>=50) grade=4;
else if(percent>=30) grade=5;
else grade=6;

document.getElementById("score").innerText="Grade: "+grade;

}


function startConversation(){

const intro="Hello! Welcome to the national park information center. How can I help you?";

addBubble(intro,"ai");

speak(intro);

}


function resetChat(){

document.getElementById("chat").innerHTML="";
document.getElementById("score").innerHTML="";

turns=0;
points=0;

startConversation();

}


window.onload=startConversation;

</script>

</body>
</html>
