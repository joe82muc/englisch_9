<script>
const scores = {
  a: { r: 0, w: 0 },
  b: { r: 0, w: 0 },
  c: { r: 0, w: 0 }
};

const taskState = {};

function updScore(level) {
  const r = document.getElementById(level + "-r");
  const w = document.getElementById(level + "-w");
  if (r) r.textContent = scores[level].r;
  if (w) w.textContent = scores[level].w;
}

function toggleInfo() {
  const body = document.getElementById("info-body");
  const header = document.querySelector(".info-hdr");
  if (body) body.classList.toggle("open");
  if (header) header.classList.toggle("open");
}

function setLevel(level, btn) {
  document.querySelectorAll(".ltab").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");

  document.querySelectorAll(".level-section").forEach(s => s.classList.remove("show"));
  const section = document.getElementById("level-" + level);
  if (section) section.classList.add("show");
}

function norm(text) {
  return String(text || "")
    .toLowerCase()
    .replace(/[?.!,]/g, "")
    .replace(/\s+/g, " ")
    .trim();
}

function clearHint(id) {
  const box = document.getElementById(id + "h");
  if (!box) return;
  box.textContent = "";
  box.className = "ai-hint";
}

function setHint(id, text, loading = false) {
  const box = document.getElementById(id + "h");
  if (!box) return;
  box.textContent = text;
  box.className = loading ? "ai-hint show loading" : "ai-hint show";
}

function localPresentPerfectHint(studentAnswer, correctAnswer, grammarTopic) {
  const s = norm(studentAnswer);
  const c = norm(correctAnswer);
  const g = norm(grammarTopic);

  if (g.includes("for vs since")) {
    if (c.includes("since")) return "Denke an einen Startpunkt: Tag, Jahr oder Uhrzeit → since.";
    if (c.includes("for")) return "Denke an eine Zeitspanne: a week, two years → for.";
  }

  if ((c.includes("have") || c.includes("has")) && !(s.includes("have") || s.includes("has"))) {
    return "Dir fehlt have oder has.";
  }

  if (c.includes("has") && s.includes("have")) {
    return "Bei he, she, it brauchst du has.";
  }

  if (c.includes("have") && s.includes("has")) {
    return "Bei I, you, we, they brauchst du have.";
  }

  if (c.includes("been") && !s.includes("been")) {
    return "Die 3. Form von be ist been.";
  }

  if (c.includes("lived") && !s.includes("lived")) {
    return "Nach have oder has brauchst du hier lived.";
  }

  if (c.includes("achieved") && !s.includes("achieved")) {
    return "Nach have oder has brauchst du hier achieved.";
  }

  if (c.includes("listened") && !s.includes("listened")) {
    return "Nach have oder has brauchst du hier listened.";
  }

  if (c.includes("visited") && !s.includes("visited")) {
    return "Nach have oder has brauchst du hier visited.";
  }

  if (c.includes("sung") && !s.includes("sung")) {
    return "Achte auf das unregelmäßige Verb: sing – sang – sung.";
  }

  if (c.includes("already") && !s.includes("already")) {
    return "Das Signalwort already fehlt.";
  }

  if (c.includes("ever") && !s.includes("ever")) {
    return "In der Frage fehlt ever.";
  }

  if ((c.includes("haven't") || c.includes("have not")) && !(s.includes("not") || s.includes("haven't"))) {
    return "Der Satz muss verneint sein: haven't / have not.";
  }

  return "Prüfe have oder has und dann die 3. Verbform.";
}

async function getAiHint(obj) {
  try {
    setHint(obj.exerciseId, "KI denkt nach ...", true);

    const response = await fetch("https://englisch-9.onrender.com/hint", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(obj)
    });

    if (!response.ok) {
      throw new Error("Serverfehler");
    }

    const data = await response.json();
    const hint = (data.hint || "").trim();

    if (!hint || hint.toLowerCase().includes("-ing")) {
      setHint(obj.exerciseId, "💡 " + localPresentPerfectHint(obj.studentAnswer, obj.correctAnswer, obj.grammarTopic));
      return;
    }

    setHint(obj.exerciseId, "💡 " + hint);
  } catch (e) {
    setHint(obj.exerciseId, "💡 " + localPresentPerfectHint(obj.studentAnswer, obj.correctAnswer, obj.grammarTopic));
  }
}

function taskLocked(id) {
  return !!(taskState[id] && taskState[id].locked);
}

function markScoredOnce(id, level, ok) {
  if (taskState[id] && taskState[id].scored) return;

  if (ok) {
    scores[level].r++;
  } else {
    scores[level].w++;
  }

  updScore(level);

  taskState[id] = {
    scored: true,
    locked: ok
  };
}

async function checkGap(id, correct, level, extra = []) {
  if (taskLocked(id)) return;

  clearHint(id);

  const input = document.getElementById(id + "g");
  const fb = document.getElementById(id + "f");
  if (!input || !fb) return;

  const val = norm(input.value);
  const accepted = [norm(correct), ...extra.map(norm)];
  const ok = accepted.includes(val);

  input.classList.remove("correct", "wrong");
  input.classList.add(ok ? "correct" : "wrong");

  fb.className = "fb " + (ok ? "good" : "bad");
  fb.textContent = ok ? "✅ Correct!" : "❌ Not correct. Improve your answer and check again.";

  markScoredOnce(id, level, ok);

  if (ok) {
    input.disabled = true;
    taskState[id].locked = true;
  } else {
    await getAiHint({
      exerciseId: id,
      studentAnswer: input.value,
      correctAnswer: correct,
      exerciseText: document.querySelector("#" + id + " .ex-sentence")?.innerText || "",
      grammarTopic: "Present Perfect"
    });
  }
}

function showGap(id, correct, level) {
  clearHint(id);

  const input = document.getElementById(id + "g");
  const fb = document.getElementById(id + "f");
  if (!input || !fb) return;

  input.value = correct;
  input.classList.remove("wrong");
  input.classList.add("correct");
  input.disabled = true;

  fb.className = "fb good";
  fb.textContent = "→ " + correct;

  taskState[id] = {
    scored: true,
    locked: true
  };
}

async function checkGap2(id, first, second, level) {
  if (taskLocked(id)) return;

  clearHint(id);

  const i1 = document.getElementById(id + "g");
  const i2 = document.getElementById(id + "g2");
  const fb = document.getElementById(id + "f");
  if (!i1 || !i2 || !fb) return;

  const ok = norm(i1.value) === norm(first) && norm(i2.value) === norm(second);

  i1.classList.remove("correct", "wrong");
  i2.classList.remove("correct", "wrong");

  i1.classList.add(ok ? "correct" : "wrong");
  i2.classList.add(ok ? "correct" : "wrong");

  fb.className = "fb " + (ok ? "good" : "bad");
  fb.textContent = ok ? "✅ Correct!" : "❌ Not correct. Improve your answer and check again.";

  markScoredOnce(id, level, ok);

  if (ok) {
    i1.disabled = true;
    i2.disabled = true;
    taskState[id].locked = true;
  } else {
    await getAiHint({
      exerciseId: id,
      studentAnswer: (i1.value + " " + i2.value).trim(),
      correctAnswer: first + " " + second,
      exerciseText: document.querySelector("#" + id + " .ex-sentence")?.innerText || "",
      grammarTopic: "Present Perfect question with ever"
    });
  }
}

function showGap2(id, first, second, level) {
  clearHint(id);

  const i1 = document.getElementById(id + "g");
  const i2 = document.getElementById(id + "g2");
  const fb = document.getElementById(id + "f");
  if (!i1 || !i2 || !fb) return;

  i1.value = first;
  i2.value = second;

  i1.classList.remove("wrong");
  i2.classList.remove("wrong");

  i1.classList.add("correct");
  i2.classList.add("correct");

  i1.disabled = true;
  i2.disabled = true;

  fb.className = "fb good";
  fb.textContent = "→ " + first + " … " + second;

  taskState[id] = {
    scored: true,
    locked: true
  };
}

async function checkMC(id, btn, correct, level) {
  if (taskLocked(id)) return;

  clearHint(id);

  const wrapper = btn.closest(".mc-choices");
  const fb = document.getElementById(id + "f");
  if (!wrapper || !fb) return;

  const chosen = btn.textContent.trim();
  const ok = chosen === correct;

  wrapper.querySelectorAll(".mc-btn").forEach(b => {
    b.classList.remove("correct", "wrong");
  });

  if (ok) {
    btn.classList.add("correct");
    wrapper.querySelectorAll(".mc-btn").forEach(b => b.disabled = true);
    markScoredOnce(id, level, true);
    taskState[id].locked = true;
    fb.className = "fb good";
    fb.textContent = "✅ Correct!";
  } else {
    btn.classList.add("wrong");
    wrapper.querySelectorAll(".mc-btn").forEach(b => {
      if (b.textContent.trim() === correct) b.classList.add("correct");
    });
    markScoredOnce(id, level, false);
    fb.className = "fb bad";
    fb.textContent = "❌ Not correct. Reset this task and try again.";

    await getAiHint({
      exerciseId: id,
      studentAnswer: chosen,
      correctAnswer: correct,
      exerciseText: document.querySelector("#" + id + " .ex-sentence")?.innerText || "",
      grammarTopic: "for vs since"
    });
  }
}

async function checkTr(id, accepted, level) {
  if (taskLocked(id)) return;

  clearHint(id);

  const input = document.getElementById(id + "i");
  const fb = document.getElementById(id + "f");
  if (!input || !fb) return;

  const val = norm(input.value);
  const ok = accepted.map(norm).includes(val);

  input.classList.remove("correct", "wrong");
  input.classList.add(ok ? "correct" : "wrong");

  fb.className = "fb " + (ok ? "good" : "bad");
  fb.textContent = ok ? "✅ Correct!" : "❌ Not correct. Improve your answer and check again.";

  markScoredOnce(id, level, ok);

  if (ok) {
    input.disabled = true;
    taskState[id].locked = true;
  } else {
    await getAiHint({
      exerciseId: id,
      studentAnswer: input.value,
      correctAnswer: accepted[0],
      exerciseText: document.querySelector("#" + id + " .ex-sentence")?.innerText || "",
      grammarTopic: "Present Perfect sentence building"
    });
  }
}

function showTr(id, answer, level) {
  clearHint(id);

  const input = document.getElementById(id + "i");
  const fb = document.getElementById(id + "f");
  if (!input || !fb) return;

  input.value = answer;
  input.classList.remove("wrong");
  input.classList.add("correct");
  input.disabled = true;

  fb.className = "fb good";
  fb.textContent = "→ Model answer shown";

  taskState[id] = {
    scored: true,
    locked: true
  };
}

function resetTask(id) {
  clearHint(id);

  const card = document.getElementById(id);
  if (!card) return;

  card.querySelectorAll(".gap").forEach(i => {
    i.value = "";
    i.disabled = false;
    i.className = "gap";
  });

  card.querySelectorAll(".tr-input").forEach(i => {
    i.value = "";
    i.disabled = false;
    i.className = "tr-input";
  });

  card.querySelectorAll(".mc-btn").forEach(b => {
    b.disabled = false;
    b.className = "mc-btn";
  });

  const fb = document.getElementById(id + "f");
  if (fb) {
    fb.textContent = "";
    fb.className = "fb";
  }

  taskState[id] = {
    scored: false,
    locked: false
  };
}

function resetLevel(level) {
  scores[level] = { r: 0, w: 0 };
  updScore(level);

  const section = document.getElementById("level-" + level);
  if (!section) return;

  section.querySelectorAll(".ex-card").forEach(card => {
    resetTask(card.id);
  });
}
</script>
